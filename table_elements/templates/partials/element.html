<div class="list-content">
    {% for element in elements %}
    <div class="element-box">
        <a href="{% url "table_elements:single_element" element.slug %}">
            <div class="element-item {{element.get_css_class}}">
                <h2 class='element-simbol'>{{element.simbol}}</h2>
            </div>
        </a>
        <p class="element-name">
            {{element.name}}
        </p>
    </div>
    {% endfor %}
</div>
