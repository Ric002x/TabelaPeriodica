{% extends "pages/single_element.html" %}

{% block element_detail %}
<section class="element-content-info">
    <h2 class="title-element">
        {{ element.name }} ({{element.simbol}})
    </h2>
    <div class="element-description-container">
        <p class='element-description'>
            <img class='element-img' src="{{element.element_cover.url}}" alt="{{element.name}}">
        </p>
    </div>
</section>
{% endblock element_detail %}
