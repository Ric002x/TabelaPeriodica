<div class="activity-content-detail">
    <div class="activity-group-detail">
        <h2 class="acitivity-title-detail">{{activity.title}}</h2>
        <div class="description-content">
            <p class="activity-description-detail">{{activity.description}}</p>
            <span class="activity-subject-detail">Matéria: {{activity.subject}}</span><br>
            <span class="activity-level-detail">Turma: {{activity.level}}</span>
        </div>
        {% comment %} {% if activity.file %}
        {% else %}
            <div class="no-file-detail"></div>
        {% endif %} {% endcomment %}
        <div class="no-file-container">
            <div class="no-file-detail"></div>
        </div>
    </div>
</div>
